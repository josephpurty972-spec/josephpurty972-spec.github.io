<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)" rx="16"/>
  <!-- Blocked connections -->
  <g transform="translate(140,200)">
    <circle r="50" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6"/>
    <text y="6" text-anchor="middle" fill="#ff6b6b" font-size="28">SS</text>
    <line x1="50" y1="0" x2="130" y2="-30" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
    <text x="155" y="-25" fill="#ff6b6b" font-size="14" opacity="0.7">× 被识别</text>
  </g>
  <g transform="translate(320,140)">
    <circle r="45" fill="none" stroke="#ffa502" stroke-width="2" opacity="0.6"/>
    <text y="6" text-anchor="middle" fill="#ffa502" font-size="22">V2Ray</text>
    <line x1="45" y1="10" x2="120" y2="20" stroke="#ffa502" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
    <text x="130" y="25" fill="#ffa502" font-size="14" opacity="0.7">× 特征暴露</text>
  </g>
  <g transform="translate(320,270)">
    <circle r="42" fill="none" stroke="#ffa502" stroke-width="2" opacity="0.6"/>
    <text y="6" text-anchor="middle" fill="#ffa502" font-size="20">Trojan</text>
    <line x1="42" y1="-5" x2="110" y2="-15" stroke="#ffa502" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
    <text x="118" y="-10" fill="#ffa502" font-size="14" opacity="0.7">× 大面积失效</text>
  </g>
  <!-- Working connection -->
  <g transform="translate(620,200)">
    <circle r="55" fill="rgba(79,172,254,0.1)" stroke="#4facfe" stroke-width="2.5"/>
    <text y="-8" text-anchor="middle" fill="#4facfe" font-size="18" font-weight="600">VLESS</text>
    <text y="14" text-anchor="middle" fill="#00f2fe" font-size="16">Reality</text>
    <text y="80" text-anchor="middle" fill="#4fd6ac" font-size="15" font-weight="600">✓ 稳定可用</text>
  </g>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="20" font-weight="700">2026 年协议生存现状</text>
</svg>
