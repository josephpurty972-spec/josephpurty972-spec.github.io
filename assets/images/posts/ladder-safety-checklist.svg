  <text x="400" y="320" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="13">记住：工具本身是中性的，关键是你怎么用</text>
  <text x="400" y="360" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="11">遵守当地法律法规，仅用于合法的学习、工作和跨境业务</text>
