<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/><stop offset="50%" style="stop-color:#203a43"/><stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" fill="url(#bg2)" rx="16"/>
  <!-- 4 test cards -->
  <g transform="translate(110,180)">
    <rect x="-70" y="-60" width="140" height="120" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text y="-20" text-anchor="middle" fill="#4facfe" font-size="32">📡</text>
    <text y="10" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">多运营商</text>
    <text y="32" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">电信/移动/联通</text>
  </g>
  <g transform="translate(300,180)">
    <rect x="-70" y="-60" width="140" height="120" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text y="-20" text-anchor="middle" fill="#ffa502" font-size="32">🕐</text>
    <text y="10" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">分时段</text>
    <text y="32" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">重点晚高峰</text>
  </g>
  <g transform="translate(500,180)">
    <rect x="-70" y="-60" width="140" height="120" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text y="-20" text-anchor="middle" fill="#4fd6ac" font-size="32">🤖</text>
    <text y="10" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">真实场景</text>
    <text y="32" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">ChatGPT/YouTube</text>
  </g>
  <g transform="translate(690,180)">
    <rect x="-70" y="-60" width="140" height="120" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text y="-20" text-anchor="middle" fill="#ff6b6b" font-size="32">⚡</text>
    <text y="10" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">特殊时期</text>
    <text y="32" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">恢复速度观察</text>
  </g>
  <text x="400" y="50" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="20" font-weight="700">测试方法：四维度实测</text>
