  <!-- Connection lines from China to popular nodes -->
  <g opacity="0.15" stroke="#4facfe" stroke-width="1" stroke-dasharray="4,4">
    <line x1="520" y1="170" x2="590" y2="145"/>
    <line x1="520" y1="170" x2="530" y2="215"/>
    <line x1="520" y1="170" x2="540" y2="175"/>
    <line x1="520" y1="170" x2="160" y2="150"/>
  </g>
  <!-- User location -->
