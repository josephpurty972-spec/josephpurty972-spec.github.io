  <!-- Legend -->
  <g transform="translate(40, 370)">
    <rect width="720" height="50" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="30" cy="25" r="5" fill="#22c55e"/>
    <text x="45" y="29" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="11">推荐节点（低延迟）</text>
    <circle cx="200" cy="25" r="5" fill="#3b82f6"/>
    <text x="215" y="29" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="11">可用节点</text>
    <circle cx="340" cy="25" r="5" fill="#fbbf24"/>
    <text x="355" y="29" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="11">用户位置</text>
    <text x="700" y="29" text-anchor="end" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="10">数据来源：tonbovpn.com</text>
  </g>
</svg>