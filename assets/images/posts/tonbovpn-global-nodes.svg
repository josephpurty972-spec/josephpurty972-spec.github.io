<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#162040"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="440" fill="url(#mapBg)" rx="16"/>
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="20" font-weight="700">TonBoVPN 全球节点覆盖</text>
  <text x="400" y="60" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="12">17+ 国家与地区 · 原生 IP · 持续扩展中</text>
  <!-- Simplified world map outline -->
  <g opacity="0.12" stroke="#4facfe" stroke-width="0.8" fill="none" transform="translate(60,60)">
    <!-- North America -->
    <path d="M 80,100 Q 100,70 140,65 Q 170,60 200,80 Q 210,90 220,100 Q 200,130 180,150 Q 150,160 120,150 Q 90,140 80,120 Z"/>
    <!-- South America -->
    <path d="M 160,180 Q 180,170 190,190 Q 200,220 190,260 Q 180,280 165,290 Q 150,280 145,260 Q 140,230 150,200 Z"/>
    <!-- Europe -->
    <path d="M 340,75 Q 360,65 380,70 Q 400,75 410,90 Q 405,105 390,110 Q 370,108 355,100 Q 340,90 340,75 Z"/>
    <!-- Africa -->
    <path d="M 360,130 Q 380,120 400,130 Q 410,150 405,180 Q 395,210 380,220 Q 365,215 355,195 Q 348,170 350,150 Z"/>
    <!-- Asia -->
    <path d="M 420,60 Q 460,50 510,55 Q 560,60 590,80 Q 600,100 580,120 Q 550,130 510,125 Q 470,115 440,100 Q 420,85 420,60 Z"/>
    <!-- Southeast Asia / Oceania -->
    <path d="M 540,140 Q 560,135 580,140 Q 600,150 610,165 Q 600,175 580,170 Q 560,165 545,155 Z"/>
  </g>
  <!-- Node markers with labels -->
  <!-- HK -->
  <circle cx="540" cy="175" r="5" fill="#3b82f6" filter="url(#nodeGlow)"/>
  <circle cx="540" cy="175" r="2" fill="#fff"/>
  <text x="540" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="9">香港</text>
  <!-- TW -->
