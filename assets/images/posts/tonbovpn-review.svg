<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#1a3058"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/><stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg3)" rx="16"/>
  <text x="400" y="50" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="22" font-weight="700">TonBoVPN 实测评分</text>
  <!-- Score bars -->
  <g transform="translate(100,90)">
    <text y="18" fill="rgba(255,255,255,0.7)" font-size="14">稳定性</text>
