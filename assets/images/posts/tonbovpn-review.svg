    <rect x="120" y="4" width="456" height="22" rx="11" fill="url(#bar)"/>
    <text x="590" y="20" fill="#4facfe" font-size="14" font-weight="600">95%</text>
  </g>
  <g transform="translate(100,140)">
    <text y="18" fill="rgba(255,255,255,0.7)" font-size="14">AI 可用性</text>
    <rect x="120" y="4" width="480" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
    <rect x="120" y="4" width="432" height="22" rx="11" fill="url(#bar)"/>
    <text x="566" y="20" fill="#4facfe" font-size="14" font-weight="600">90%</text>
  </g>
  <g transform="translate(100,190)">
    <text y="18" fill="rgba(255,255,255,0.7)" font-size="14">晚高峰速度</text>
    <rect x="120" y="4" width="480" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
    <rect x="120" y="4" width="408" height="22" rx="11" fill="url(#bar)"/>
    <text x="542" y="20" fill="#4facfe" font-size="14" font-weight="600">85%</text>
  </g>
  <g transform="translate(100,240)">
    <text y="18" fill="rgba(255,255,255,0.7)" font-size="14">易用性</text>
    <rect x="120" y="4" width="480" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
    <rect x="120" y="4" width="432" height="22" rx="11" fill="url(#bar)"/>
    <text x="566" y="20" fill="#4facfe" font-size="14" font-weight="600">90%</text>
  </g>
  <g transform="translate(100,290)">
    <text y="18" fill="rgba(255,255,255,0.7)" font-size="14">性价比</text>
    <rect x="120" y="4" width="480" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
    <rect x="120" y="4" width="420" height="22" rx="11" fill="url(#bar)"/>
