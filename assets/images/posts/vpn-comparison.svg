<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b2838"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bg5)" rx="16"/>
  <text x="400" y="45" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="20" font-weight="700">四款 VPN 稳定性对比</text>
  <!-- Chart bars -->
  <g transform="translate(0,60)">
    <!-- Y axis labels -->
    <text x="80" y="30" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="12">100%</text>
    <text x="80" y="110" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="12">75%</text>
    <text x="80" y="190" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="12">50%</text>
    <text x="80" y="270" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="12">25%</text>
    <!-- Grid lines -->
    <line x1="90" y1="26" x2="740" y2="26" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="90" y1="106" x2="740" y2="106" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="90" y1="186" x2="740" y2="186" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="90" y1="266" x2="740" y2="266" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- TonBoVPN 95% -->
    <rect x="140" y="38" width="100" height="228" rx="6" fill="#4facfe" opacity="0.85"/>
    <text x="190" y="30" text-anchor="middle" fill="#4facfe" font-size="14" font-weight="700">95%</text>
    <text x="190" y="290" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">TonBoVPN</text>
    <!-- ExpressVPN 92% -->
    <rect x="300" y="46" width="100" height="220" rx="6" fill="#4fd6ac" opacity="0.75"/>
    <text x="350" y="38" text-anchor="middle" fill="#4fd6ac" font-size="14" font-weight="700">92%</text>
    <text x="350" y="290" text-anchor="middle" fill="#fff" font-size="13">ExpressVPN</text>
    <!-- Surfshark 78% -->
    <rect x="460" y="80" width="100" height="186" rx="6" fill="#ffa502" opacity="0.65"/>
    <text x="510" y="72" text-anchor="middle" fill="#ffa502" font-size="14" font-weight="700">78%</text>
    <text x="510" y="290" text-anchor="middle" fill="#fff" font-size="13">Surfshark</text>
    <!-- NordVPN 70% -->
    <rect x="620" y="100" width="100" height="166" rx="6" fill="#ff6b6b" opacity="0.55"/>
    <text x="670" y="92" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="700">70%</text>
    <text x="670" y="290" text-anchor="middle" fill="#fff" font-size="13">NordVPN</text>
  </g>
</svg>
